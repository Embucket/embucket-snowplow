AWSTemplateFormatVersion: '2010-09-09'
Description: Embucket Lambda supporting infrastructure (IAM role + DynamoDB state store)

Parameters:
  S3TableBucketArn:
    Type: String
    Description: ARN of your AWS S3 Table Bucket (e.g., arn:aws:s3tables:us-east-2:123456789:bucket/my-bucket)

Resources:
  # DynamoDB table for Embucket state store
  StateStoreTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'embucket-statestore-${AWS::StackName}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: query_id
          AttributeType: S
        - AttributeName: request_id
          AttributeType: S
        - AttributeName: session_id
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI_SESSION_ID_INDEX
          KeySchema:
            - AttributeName: session_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: GSI_REQUEST_ID_INDEX
          KeySchema:
            - AttributeName: request_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: GSI_QUERY_ID_INDEX
          KeySchema:
            - AttributeName: query_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  # Lambda execution role — provides AWS credentials for S3 Tables access automatically
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole'
      Policies:
        - PolicyName: EmbucketAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 's3tables:*'
                Resource: '*'
              - Effect: Allow
                Action:
                  - 's3:*'
                Resource: '*'
              - Effect: Allow
                Action:
                  - 'dynamodb:GetItem'
                  - 'dynamodb:PutItem'
                  - 'dynamodb:UpdateItem'
                  - 'dynamodb:DeleteItem'
                  - 'dynamodb:Query'
                  - 'dynamodb:Scan'
                Resource:
                  - !GetAtt StateStoreTable.Arn
                  - !Sub '${StateStoreTable.Arn}/index/*'

Outputs:
  LambdaExecutionRoleArn:
    Description: IAM role ARN for the Embucket Lambda — pass to `aws lambda create-function --role`
    Value: !GetAtt LambdaExecutionRole.Arn

  StateStoreTableName:
    Description: DynamoDB state store table name — pass to the Lambda as STATESTORE_TABLE_NAME
    Value: !Ref StateStoreTable
